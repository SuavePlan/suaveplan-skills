# Project archetypes — recipes consumed by the pick-plugins skill.
#
# Each archetype names a project shape and the Suaveplan plugins that fit it.
# `core` is the always-recommended set; `optional` is contextual extras.
# `signals` are phrases in user descriptions that match this archetype.

password-manager:
  name: Password manager / vault
  signals:
    - password manager
    - vault
    - 1password
    - bitwarden
    - credential storage
    - secrets manager
  core:
    - foundation
    - observability
    - primitives
    - validation
    - control-flow
    - events
    - crypto
    - auth
    - security
    - vaulted
    - database
    - storage
    - drive
    - codes
    - react-ui
    - platform
    - dev
  optional:
    - i18n
    - search
    - network-core
  notes: |
    `vaulted` carries the SRP/OTP/WebAuthn/CBOR primitives. `security`
    bundles SLSA, secret/PII detection, sandbox, audit logging, HIBP
    breach checks, and credential-storage bridges (macos-keychain,
    password-formats). `drive` carries encrypted file attachments and
    sharing. Pair `crypto` and `vaulted` explicitly — `vaulted` depends
    on `crypto`.

